## Exemplo de VirtualHost para Apache (Windows)
## Copie para o arquivo de configuração de vhosts do Apache e ajuste caminhos
<VirtualHost *:80>
    ServerName locadora.test
    DocumentRoot "C:/Apache/htdocs/locadora-veiculos-perfis/public"
    <Directory "C:/Apache/htdocs/locadora-veiculos-perfis/public">
        Require all granted
        AllowOverride All
        Options Indexes FollowSymLinks
    </Directory>
</VirtualHost>

# Adicione no hosts (C:\Windows\System32\drivers\etc\hosts):
# 127.0.0.1 locadora.test
